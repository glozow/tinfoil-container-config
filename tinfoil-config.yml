# Gated-inference shape on the `gated-inference` branch.

cvm-version: 0.7.3
cpus: 4
memory: 16384

containers:
  - name: "gated-inference"
    image: "ghcr.io/glozow/gated-inference:v0.0.1@sha256:b4738d3662476e103cce81e76409552a073da8bdb14fe73e499fa21177751305"
    env:
      - GUARD_ENCLAVE: "guard-2-llamaguard31bq4.girizen.containers.tinfoil.dev"
      - GUARD_REPO: "glozow/tinfoil-container-config"

shim:
  upstream-port: 8080
  paths:
    - /generate
    - /pubkey
    - /health
