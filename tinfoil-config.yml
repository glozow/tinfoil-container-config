# Guard-shaped deploy config.
# Deployed from tag `guard-v0.0.1`. Overwritten on `inference-*` tags
# with the inference-shaped config in the same file.

cvm-version: 0.7.3
cpus: 2
memory: 8192

containers:
  - name: "guard"
    image: "ghcr.io/glozow/guard:v0.0.1@sha256:40942f51782ecec45440bbf6a94fdb2b09b01b1cba0a1a09601c771de40381cc"

shim:
  upstream-port: 8080
  paths:
    - /classify
    - /pubkey
    - /health
